<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng Cơ điện - Vận tải | Vui cùng WorldCup 2026</title>
    <style>
        :root { --primary-color: #0d5c3a; --secondary-color: #f4a261; --bg-color: #f4f6f8; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background: var(--bg-color); color: #333; }
        header { background: var(--primary-color); color: white; padding: 15px 20px; font-size: 20px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .container { display: flex; max-width: 1300px; margin: 20px auto; padding: 0 15px; gap: 20px; flex-wrap: wrap; }
        .main-content { flex: 2; min-width: 350px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .sidebar { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .match-group { margin-bottom: 25px; text-align: left; }
        .group-title { background: #e8f5e9; color: var(--primary-color); padding: 6px 12px; font-weight: bold; border-left: 4px solid var(--primary-color); margin-bottom: 10px; border-radius: 0 4px 4px 0; }
        .match-card { border: 1px solid #e0e0e0; padding: 12px; margin-bottom: 10px; border-radius: 6px; background: #fff; position: relative; }
        .match-meta { font-size: 12px; color: #777; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .match-teams { display: flex; justify-content: space-around; align-items: center; font-size: 16px; font-weight: bold; margin: 10px 0; }
        .vs { color: #aaa; font-size: 13px; font-weight: normal; }
        .vote-options { display: flex; justify-content: space-around; background: #f9f9f9; padding: 8px; border-radius: 4px; font-size: 14px; }
        .vote-options label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .locked { background: #eaeaea; color: #888; }
        .locked-tag { position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; font-size: 10px; padding: 2px 6px; border-radius: 3px; font-weight: bold; }
        .status-text { font-size: 11px; margin-top: 4px; font-style: italic; display: block; text-align: right;}
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { border: 1px solid #e0e0e0; padding: 8px 4px; text-align: center; }
        th { background-color: var(--primary-color); color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        .login-container { max-width: 420px; margin: 80px auto; background: white; padding: 35px 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .login-logo { font-size: 22px; font-weight: bold; color: var(--primary-color); margin-bottom: 5px; }
        .login-sub { font-size: 17px; color: #cd853f; margin-bottom: 25px; font-weight: bold; }
        input[type="text"], input[type="password"] { width: 100%; padding: 11px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button.btn-main { width: 100%; padding: 11px; background: var(--primary-color); color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button.btn-main:hover { background: #0a462c; }
        
        .admin-zone { background: #fff3cd; border: 1px solid #ffeeba; padding: 8px; margin-top: 8px; border-radius: 4px; font-size: 13px; text-align: left;}
        .admin-zone input { width: 50px; text-align: center; padding: 2px; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; font-weight: bold; color: var(--primary-color); z-index: 9999; }
    </style>
</head>

<div id="loading" class="loading-overlay" style="display:none;">⏳ Đang tải dữ liệu từ phòng máy... Vui lòng đợi...</div>

    </div>
</div>

    let currentUser = null;
    let mockUsers = {};
    let userVotes = {};
    let adminResults = {};

    // HÀM ĐỌC DỮ LIỆU TỪ GOOGLE SHEETS
    async function fetchSheetsData() {
        document.getElementById('loading').style.display = 'flex';
        try {
            const res = await fetch(`${API_URL}?action=getData`);
            const data = await res.json();
            mockUsers = data.users || {};
            userVotes = data.votes || {};
            adminResults = data.adminResults || {};
        } catch (e) {
            console.error("Lỗi lấy dữ liệu: ", e);
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    // ĐĂNG NHẬP THỰC TẾ
    async function handleLogin() {
        const u = document.getElementById('username').value.trim().toLowerCase();
        const p = document.getElementById('password').value.trim();

        if(!u || !p) { alert("Vui lòng nhập đầy đủ thông tin!"); return; }

        await fetchSheetsData(); // Lấy dữ liệu mới nhất tự động

        if (mockUsers[u] && mockUsers[u].password === p) {
            currentUser = { username: u, ...mockUsers[u] };
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('user-display').innerText = `Xin chào, ${currentUser.name}`;
            
            renderMatches();
            renderSidebar();
        } else {
            alert("Mã số đăng nhập hoặc mật khẩu sai!");
        }
    }

    function handleLogout() {
        currentUser = null;
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('login-screen').style.display = 'block';
    }

    // TÍNH TOÁN TỰ ĐỘNG KHÓA SAU 15 GIỜ BÓNG LĂN
    function isMatchLocked(dateStr, timeStr) {
        const [day, month, year] = dateStr.split('/');
        const [hour, minute] = timeStr.split(':');
        const kickoffTime = new Date(year, month - 1, day, hour, minute);
        const lockTime = new Date(kickoffTime.getTime() + (15 * 60 * 60 * 1000));
        return new Date() > lockTime;
    }

    // ĐỔ DANH SÁCH TRẬN ĐẤU RA WEB
    function renderMatches() {
        const container = document.getElementById('matches-container');
        container.innerHTML = "";
        let currentGroup = "";
        let groupDiv = null;

        matches.forEach(m => {
            const [id, date, time, teamA, teamB, group, stadium] = m;
            const isLocked = isMatchLocked(date, time);
            
            if (group !== currentGroup) {
                currentGroup = group;
                groupDiv = document.createElement('div');
                groupDiv.className = 'match-group';
                groupDiv.innerHTML = `<div class="group-title">BẢNG ${group}</div>`;
                container.appendChild(groupDiv);
            }

            const card = document.createElement('div');
            card.className = `match-card ${isLocked ? 'locked' : ''}`;
            
            const savedChoice = userVotes[currentUser.username]?.[id] || "";
            const adminRes = adminResults[id]?.result || "";
            const adminScore = adminResults[id]?.score || "";

            let html = `
                <div class="match-meta">
                    <span>Mã: ${id} | 📅 ${date} - ⏰ ${time}</span>
                    <span>🏟️ ${stadium}</span>
                </div>
                ${isLocked ? '<span class="locked-tag">Hết giờ sửa</span>' : ''}
                <div class="match-teams">
                    <div>${teamA}</div> <div class="vs">VS</div> <div>${teamB}</div>
                </div>
                <div class="vote-options">
                    <label><input type="radio" name="vote-${id}" value="thang" ${savedChoice==='thang'?'checked':''} ${isLocked?'disabled':''} onchange="saveVote('${id}', 'thang')"> Đội A thắng</label>
                    <label><input type="radio" name="vote-${id}" value="hoa" ${savedChoice==='hoa'?'checked':''} ${isLocked?'disabled':''} onchange="saveVote('${id}', 'hoa')"> Hòa</label>
                    <label><input type="radio" name="vote-${id}" value="thua" ${savedChoice==='thua'?'checked':''} ${isLocked?'disabled':''} onchange="saveVote('${id}', 'thua')"> Đội A thua</label>
                </div>
                <span class="status-text" id="status-${id}"></span>
            `;

            if (adminRes) {
                let textRes = adminRes === 'thang' ? 'Đội A Thắng' : (adminRes === 'hoa' ? 'Hòa' : 'Đội A Thua');
                html += `<div style="margin-top:6px; font-size:12px; color:#27ae60; font-weight:bold;">Tỷ số thực tế: ${adminScore} (${textRes})</div>`;
            }

            if (currentUser.isAdmin) {
                html += `
                    <div class="admin-zone">
                        <strong>Khu Admin:</strong> Tỷ số: <input type="text" id="score-${id}" value="${adminScore}"> | Kết quả: 
                        <select id="res-${id}">
                            <option value="">-- Chọn --</option>
                            <option value="thang" ${adminRes==='thang'?'selected':''}>Đội A Thắng</option>
                            <option value="hoa" ${adminRes==='hoa'?'selected':''}>Hòa</option>
                            <option value="thua" ${adminRes==='thua'?'selected':''}>Đội A Thua</option>
                        </select>
                        <button onclick="saveAdminResult('${id}')">Lưu kết quả</button>
                    </div>
                `;
            }

            card.innerHTML = html;
            groupDiv.appendChild(card);
        });
    }

    // GHI BÌNH CHỌN LÊN GOOGLE SHEETS
    async function saveVote(matchId, choice) {
        const stLabel = document.getElementById(`status-${matchId}`);
        if(stLabel) stLabel.innerText = "⏳ Đang lưu vào Sheet...";
        try {
            await fetch(`${API_URL}?action=submitVote&username=${currentUser.username}&matchId=${matchId}&choice=${choice}`);
            if(!userVotes[currentUser.username]) userVotes[currentUser.username] = {};
            userVotes[currentUser.username][matchId] = choice;
            if(stLabel) stLabel.innerText = "✅ Đã ghi nhận thành công!";
            renderSidebar();
        } catch(e) {
            if(stLabel) stLabel.innerText = "❌ Lỗi kết nối!";
        }
    }

    // ADMIN GHI KẾT QUẢ TRẬN ĐẤU LÊN SHEET
    async function saveAdminResult(matchId) {
        const score = document.getElementById(`score-${matchId}`).value;
        const result = document.getElementById(`res-${matchId}`).value;
        document.getElementById('loading').style.display = 'flex';
        try {
            await fetch(`${API_URL}?action=submitAdmin&matchId=${matchId}&score=${score}&result=${result}`);
            adminResults[matchId] = { score: score, result: result };
            alert("Admin đã cập nhật kết quả thành công!");
            renderMatches();
            renderSidebar();
        } catch(e) {
            alert("Lỗi lưu kết quả admin!");
        } finally {
            document.getElementById('loading').style.display = 'none';
        }
    }

    // TÍNH BẢNG XẾP HẠNG VÀ THỐNG KÊ SIDEBAR
    function renderSidebar() {
        const pStatsDiv = document.getElementById('personal-stats');
        const votes = userVotes[currentUser.username] || {};
        let count = 0, win = 0, hoa = 0, thua = 0;
        
        Object.keys(votes).forEach(id => {
            count++;
            if (votes[id] === 'thang') win++;
            if (votes[id] === 'hoa') hoa++;
            if (votes[id] === 'thua') thua++;
        });

        pStatsDiv.innerHTML = `
            • Đã chọn: <strong>${count} / 72</strong> trận.<br>
            • Dự đoán Thắng: <strong>${win}</strong> | Hòa: <strong>${hoa}</strong> | Thua: <strong>${thua}</strong>
        `;

        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = "";
        let stt = 1;

        Object.keys(mockUsers).forEach(username => {
            if(mockUsers[username].isAdmin) return;

            let totalVoted = Object.keys(userVotes[username] || {}).length;
            let wrongCount = 0;

            Object.keys(adminResults).forEach(mId => {
                const officialRes = adminResults[mId].result;
                const userChoice = userVotes[username]?.[mId];
                if (officialRes && userChoice && userChoice !== officialRes) {
                    wrongCount++;
                }
            });

            let kThua = wrongCount * 10;

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${stt++}</td>
                <td style="text-align:left; font-weight:500;">${mockUsers[username].name}</td>
                <td>${totalVoted}/72</td>
                <td style="color:#e74c3c; font-weight:bold;">${wrongCount}</td>
                <td style="color:#c0392b; font-weight:bold; background:#fff0f0;">${kThua}k</td>
            `;
            tbody.appendChild(row);
        });
    }

    // ĐỔI VÀ QUÊN MẬT KHẨU
    async function handleForgotPassword() {
        const action = prompt("Nhập '1' nếu muốn đổi mật khẩu.\nNhập '2' nếu quên mật khẩu:");
        if (action === "2") {
            alert("Hệ thống: Vui lòng liên hệ Trưởng phòng hoặc Ban quản trị để cấp lại mật khẩu!");
        } else if (action === "1") {
            const username = prompt("Nhập Mã số nhân viên của bạn:").trim().toLowerCase();
            const oldPassword = prompt("Nhập Mật khẩu cũ hiện tại:").trim();
            const newPassword = prompt("Nhập Mật khẩu mới muốn đổi:").trim();
            
            if(!username || !oldPassword || !newPassword) { alert("Thiếu thông tin!"); return; }
            
            document.getElementById('loading').style.display = 'flex';
            try {
                const res = await fetch(`${API_URL}?action=changePassword&username=${username}&oldPassword=${oldPassword}&newPassword=${newPassword}`);
                const data = await res.json();
                alert(data.message);
            } catch(e) {
                alert("Lỗi đường truyền hệ thống!");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
    }
</script>
